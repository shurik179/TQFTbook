# =====================================================================
# config.ini -- single source of truth for the TQFT website build/serve.
# Every script reads its locations from here (via website_paths.py); no
# other file contains hardcoded project paths. Edit this file if anything
# moves.
#
# Paths in [paths] are relative to the website/ directory (the directory
# that contains this file) unless they are absolute.
# =====================================================================

[paths]
# TeX source tree: TQFTbook.tex, the chapters, bibliography, and the
# figure-style files (definitions.tex, tikzsetup.tex, tikzcob.tex).
source = ../source

[source_files]
# Files the build reads from the source tree above.
# aux: compiled .aux, used for citation labels (recompile the PDF if it changed)
aux = TQFTbook.aux
bibliography = bibliography.tex
preface = c0-preface.tex
# Whole-book PDF; copied into site/ and served at /<pdf> (front-page tile links here).
pdf = TQFTbook.pdf

[build]
# The hand-maintained render wrapper that lives in build/.
master = book.tex

[server]
port = 5005

[tools]
# Extra PATH entries so the build can find the TeX toolchain (pdflatex,
# pdftocairo) when run from a non-login shell. Machine-specific -- absolute
# paths are expected here. Leave blank to rely on the inherited PATH.
tex_bin = /Library/TeX/texbin:/opt/homebrew/bin
